<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Draft Notification</title>
</head>
<body>
    <h2>Contract Draft {{ updated|yesno:"Updated,Generated" }}</h2>
    <p>A draft for <strong>{{ contract.title }}</strong> has been {{ updated|yesno:"updated,generated" }}.</p>
    <p>Draft version: <strong>v{{ draft.version }}</strong></p>
    <p>
        <a href="{{ site_url }}/contracts/{{ contract.id }}/" style="background:#0d6efd;color:#fff;padding:10px 16px;text-decoration:none;border-radius:4px;">Open Contract</a>
    </p>
</body>
</html>
